# Ruff configuration for grok-imagine-toolkit.
#
# At v0.1, ruff is intentionally scoped to the syntax-error tier only.
# Stylistic and unused-import lints are not enforced by CI yet because
# the v0.1 codebase has not been linted against them. Tighten this
# selection (E, W, F, I, etc.) when the maintainer is ready to do a
# cleanup pass; flipping it on now would block routine PRs on
# pre-existing issues.
#
# To run locally:  ruff check scripts/ tests/

[tool.ruff]
target-version = "py310"

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82"]
