name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Quarterly edge-test reminder (1st of Jan/Apr/Jul/Oct, 14:00 UTC).
    # Opens an issue when xAI may have shipped breaking changes.
    - cron: '0 14 1 1,4,7,10 *'

jobs:
  lint:
    name: Lint and syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff check
        run: ruff check scripts/ tests/

      - name: Python syntax check (compile all)
        run: |
          python -m compileall -q scripts/ tests/

      - name: Shellcheck on test scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./tests
          severity: warning

  smoke:
    name: Free smoke test (no API calls)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Verify --help on every CLI
        run: |
          set -e
          for f in scripts/*.py; do
            # Skip the shared client; it's not a CLI.
            if [ "$(basename "$f")" = "grok_client.py" ]; then continue; fi
            echo "::group::$f --help"
            python3 "$f" --help
            echo "::endgroup::"
          done

      - name: Verify .config.example parses as shell
        run: bash -n .config.example

  edge-test-reminder:
    name: Quarterly edge-test reminder
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Open reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Reminder] Run edge test suite (${today})`,
              body: `Quarterly reminder. xAI ships rapidly and the edge tests are the safety net for breaking changes.\n\n\`\`\`\nbash tests/test-edges.sh\n\`\`\`\n\nIf any test fails, update \`references/api-shapes.md\`, \`references/pricing.md\`, and bump the "Last verified" date in \`SKILL.md\`. Estimated cost: ~$0.50.`,
              labels: ['maintenance']
            });
